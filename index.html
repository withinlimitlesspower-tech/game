<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-dove"></i> Flappy Bird</h1>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="controls">
            <p>Press <strong>SPACE</strong>, <strong>CLICK</strong>, or <strong>TAP</strong> to flap</p>
            <button id="restartBtn"><i class="fas fa-redo"></i> Restart Game</button>
        </div>
        <div class="instructions">
            <h3>How to Play:</h3>
            <ul>
                <li>Keep the bird flying by flapping to avoid gravity.</li>
                <li>Navigate through the pipes without hitting them.</li>
                <li>Each pipe passed scores 1 point.</li>
                <li>Game ends on collision with pipes or ground.</li>
            </ul>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
